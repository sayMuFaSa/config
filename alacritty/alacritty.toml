# It's neodark colorscheme with a different background color.
[colors.normal]
black = "0x181a1f"
blue = "0x61afef"
cyan = "0x56b6c2"
green = "0x98c379"
magenta = "0xcc626a"
red = "0xe06c75"
white = "0xc9c9c9"
yellow = "0xe5c07b"

[colors.primary]
background = "0x1e2426"
foreground = "0xabb2bf"

[env]
TERM = "xterm-256color"

[font]
size = 10

[window]
opacity = 0.95
